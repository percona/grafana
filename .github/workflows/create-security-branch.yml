name: Create security branch
on:
  # @PERCONA - disable workflow
  workflow_dispatch:
permissions:
  contents: write
  id-token: write

jobs:
  main:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.branch }}
    steps:
      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@e5b7989c92b55fe3ac6dd006d6de49082ba8c507 # create-github-app-token (github-script/v9)
        with:
          github_app: grafana-releases-oss

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.get-github-app-token.outputs.token }}
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.release_branch }}

      - name: Create security branch
        id: branch
        env:
          GITHUB_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
          INPUT_RELEASE_BRANCH: ${{ inputs.release_branch }}
          INPUT_SECURITY_BRANCH_NUMBER: ${{ inputs.security_branch_number }}
          INPUT_REPOSITORY: ${{ inputs.repository }}
        run: |
          chmod +x .github/workflows/scripts/create-security-branch/create-security-branch.sh
          .github/workflows/scripts/create-security-branch/create-security-branch.sh
